name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión SemVer (sin la v), ej. 1.0.0'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease --stacktrace \
            -PappVersionName=${{ steps.ver.outputs.name }} \
            -PappVersionCode=${{ github.run_number }}

      - name: Rename APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
             dist/PayBio-v${{ steps.ver.outputs.name }}.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PayBio v${{ steps.ver.outputs.name }}
          generate_release_notes: true
          files: dist/PayBio-v${{ steps.ver.outputs.name }}.apk
          body: |
            ## PayBio v${{ steps.ver.outputs.name }} — Smart Offline Ledger

            APK instalable (firmado con clave debug para distribución abierta).

            **Instalación:** descarga el `.apk`, permite "instalar apps de orígenes desconocidos" y ábrelo.

            > 100% offline · sin permiso de Internet · datos cifrados con SQLCipher.
